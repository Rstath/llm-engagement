services:
  - type: web
    name: llm-engagement-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_SECRET
        generateValue: true
      - key: RESEARCHER_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LOCAL_LLM_BASE_URL
        sync: false
      - key: LOCAL_LLM_API_KEY
        sync: false
      - key: SMALL_LLM_MODEL
        sync: false
      - key: MEDIUM_LLM_MODEL
        sync: false
